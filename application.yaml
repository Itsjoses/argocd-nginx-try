apiVersion: argoproj.io/v1alpha1                                                                                                                                                                             
kind: Application                                                                                                                                                                                            
metadata:                                                                                                                                                                                                    
  name: nginx   
  namespace: argocd                                                                                                                                                                                 
spec:
  project: default                                                                                                                                                                                           
  source:       
    repoURL: https://github.com/Itsjoses/argocd-nginx-try.git
    targetRevision: HEAD                                                                                                                                                                                     
    path: base
  destination:                                                                                                                                                                                               
    server: https://kubernetes.default.svc
    namespace: argocd-testing                                                                                                                                                                                       
  syncPolicy:
    automated:                                                                                                                                                                                               
      prune: true
      selfHeal: true